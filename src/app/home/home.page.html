<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      G00485524
    </ion-title>
      <ion-searchbar show-clear-button="focus" value="Search Movies"></ion-searchbar>
      <ion-button [routerLink]="[ '/favourites' ]">Favourites</ion-button>
  </ion-toolbar>
</ion-header>

<!--Creating injectable list of movies in home.page.html following Week 7 Demo 1 code by GH 
Also form Week 9 Demo on Ionic Component Routing @ 7:00+ min -->

<ion-content [fullscreen]="true">
  <div class="container">
    <ion-list-header>
      <ion-label>Video Games</ion-label>
    </ion-list-header>

      <ion-card *ngFor="let movie of movies">
          <img alt="Movie Image" src="{{ movie.backdrop_path }}" />
          <ion-card-header>
            <ion-card-title>{{ movie.title }}</ion-card-title>
          </ion-card-header>

          <ion-card-content>
            {{ movie.overview }}
          </ion-card-content>
      </ion-card>
